<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>THE WARRIORS — 真战士 OR 伪战士</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Share+Tech+Mono&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <canvas id="game"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div>
      <div class="hud-box">WAVE <span id="hudWave">1</span></div>
      <div class="hud-combo" id="hudCombo"></div>
      <div class="hud-fury" id="hudFury"></div>
      <div class="hud-lives" id="hudLives"></div>
    </div>
    <div style="text-align:right">
      <div class="hud-score" id="hudScore">0</div>
      <div class="hud-box" id="hudHi">HI 0</div>
    </div>
  </div>

  <!-- Mobile controls -->
  <div id="mobileControls">
    <div class="ctrl-row">
      <div class="dpad" id="dpad">
        <div class="dpad-bg"></div>
        <div class="dpad-center"></div>
        <div class="dpad-arrow up"></div>
        <div class="dpad-arrow down"></div>
        <div class="dpad-arrow left"></div>
        <div class="dpad-arrow right"></div>
      </div>
      <div class="btn-group">
        <div class="dash-btn" id="dashBtn">闪</div>
        <div class="atk-btn" id="atkBtn">斩</div>
      </div>
    </div>
  </div>

  <!-- Title screen -->
  <div class="screen-overlay" id="titleScreen">
    <div class="screen-title">THE WARRIORS</div>
    <div class="screen-chinese">真战士</div>
    <div class="screen-or">OR</div>
    <div class="screen-chinese">伪战士</div>
    <div class="screen-info desk-info">ARROW KEYS / WASD TO MOVE · SPACE TO STRIKE · SHIFT TO DASH</div>
    <div class="screen-info mob-info">JOYSTICK TO MOVE · 斩 STRIKE · 闪 DASH</div>
    <button class="screen-btn" id="startBtn">开始 START</button>
  </div>

  <!-- Game over screen -->
  <div class="screen-overlay hidden" id="gameOverScreen">
    <div class="screen-sub">GAME OVER</div>
    <div class="screen-chinese" style="font-size:clamp(24px,8vmin,60px)">伪战士</div>
    <div class="final-score" id="finalScore">0</div>
    <div class="screen-info" id="verdictText"></div>
    <div class="screen-stats" id="finalStats"></div>
    <button class="screen-btn" id="retryBtn">再战 RETRY</button>
  </div>

  <!-- Post-processing overlays -->
  <div class="scan-ov"></div>
  <div class="vig-ov"></div>
  <div class="corner c-tl"></div>
  <div class="corner c-tr"></div>
  <div class="corner c-bl"></div>
  <div class="corner c-br"></div>

  <script src="script.js"></script>
</body>

</html>
