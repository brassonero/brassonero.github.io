<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHINESE ROCK — 真滚青 OR 伪滚青</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --red: #c83c1e;
    --red-bright: #e04a26;
    --red-glow: #ff5533;
    --green: #2daa5a;
    --green-bright: #3ddd6a;
    --green-dim: #1e7a3e;
    --dark: #0e0c0a;
    --dark-surface: #1a1714;
    --text-light: #ccbfaa;
  }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .poster {
    position: relative;
    width: 100vw; height: 100vh;
    background: var(--dark);
    overflow: hidden;
    cursor: crosshair;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  /* ========== AMBIENT GLOW ========== */
  .ambient-glow {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
      radial-gradient(ellipse 60% 40% at 50% 35%, rgba(200,60,30,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 50% 50% at 50% 80%, rgba(45,170,90,0.04) 0%, transparent 60%);
    animation: ambientPulse 6s ease-in-out infinite alternate;
  }

  @keyframes ambientPulse {
    0% { opacity: 0.7; }
    100% { opacity: 1; }
  }



  /* ========== PERSPECTIVE GRID ========== */
  .grid-container {
    position: absolute;
    top: 10%; left: 4%; right: 4%;
    height: 44%;
    z-index: 3;
    perspective: 400px;
    overflow: hidden;
    animation: gridIn 1.8s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
  }

  @keyframes gridIn {
    from { opacity: 0; filter: blur(4px); }
    to { opacity: 1; filter: blur(0); }
  }

  .grid-svg { width: 100%; height: 100%; }

  .grid-svg line { filter: drop-shadow(0 0 2px rgba(200,60,30,0.3)); }

  /* ========== WIREFRAME GLOBE ========== */
  .globe-container {
    position: absolute;
    top: 1.2%; left: 50%;
    transform: translateX(-50%);
    width: clamp(60px, 8vw, 100px);
    height: clamp(60px, 8vw, 100px);
    z-index: 5;
    animation: globeIn 1s ease 0.3s both;
    transform-style: preserve-3d;
  }

  @keyframes globeIn {
    from { opacity: 0; transform: translateX(-50%) scale(0.5); }
    to { opacity: 1; transform: translateX(-50%) scale(1); }
  }

  .globe-svg {
    width: 100%; height: 100%;
    filter: drop-shadow(0 0 6px rgba(45,170,90,0.4));
    animation: globeSpin 18s linear infinite;
  }

  @keyframes globeSpin {
    from { transform: rotateY(0deg); }
    to { transform: rotateY(360deg); }
  }

  /* ========== HEADER ========== */
  .header {
    position: absolute;
    top: 1.4%; left: 0; right: 0;
    z-index: 6;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 0 24px;
    gap: clamp(80px, 12vw, 160px);
    animation: fadeDown 0.8s ease 0.2s both;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .header-text {
    font-family: 'Chakra Petch', sans-serif;
    font-weight: 700;
    font-size: clamp(20px, 2.8vw, 36px);
    color: var(--red);
    letter-spacing: 3px;
    border: 2.5px solid var(--red);
    padding: 4px 10px;
    line-height: 1;
    text-shadow: 0 0 8px rgba(200,60,30,0.4);
    box-shadow: 0 0 12px rgba(200,60,30,0.15), inset 0 0 12px rgba(200,60,30,0.05);
    transition: text-shadow 0.3s, box-shadow 0.3s;
  }

  .header-text:hover {
    text-shadow: 0 0 16px rgba(200,60,30,0.7);
    box-shadow: 0 0 20px rgba(200,60,30,0.3), inset 0 0 20px rgba(200,60,30,0.1);
  }

  .year-markers {
    position: absolute;
    top: 2.2%; left: 50%;
    transform: translateX(-50%);
    z-index: 4;
    text-align: center;
    animation: fadeDown 0.8s ease 0.4s both;
  }

  .year-markers span {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(8px, 1vw, 12px);
    color: var(--green);
    letter-spacing: 1px;
    display: block;
    line-height: 1.5;
    text-shadow: 0 0 6px rgba(45,170,90,0.5);
  }

  /* ========== DECADE LABELS ========== */
  .decade-label {
    position: absolute;
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(9px, 1.1vw, 14px);
    color: var(--green);
    letter-spacing: 1px;
    z-index: 3;
    opacity: 0;
    animation: labelIn 0.6s ease both;
    text-shadow: 0 0 8px rgba(45,170,90,0.5);
  }

  @keyframes labelIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 0.85; transform: translateY(0); }
  }

  .label-2019 { top: 46%; left: 8%; animation-delay: 0.8s; }
  .label-2005 { top: 28%; left: 12%; animation-delay: 0.9s; }
  .label-1990 { top: 38%; left: 28%; animation-delay: 1.0s; }
  .label-2000 { top: 28%; right: 20%; animation-delay: 1.1s; }
  .label-2010 { top: 39%; right: 14%; animation-delay: 1.2s; }
  .label-2015 { top: 21%; right: 11%; animation-delay: 1.3s; }

  /* ========== WAVEFORM ========== */
  .waveform-row {
    position: absolute;
    top: 55%; left: 5%; right: 5%;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    animation: fadeUp 0.8s ease 0.9s both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .waveform-year {
    font-family: 'Chakra Petch', sans-serif;
    font-weight: 700;
    font-size: clamp(14px, 1.6vw, 20px);
    color: var(--green);
    letter-spacing: 4px;
    white-space: nowrap;
    text-shadow: 0 0 10px rgba(45,170,90,0.6);
  }

  .waveform-canvas {
    flex: 1;
    height: 28px;
    display: block;
  }

  /* ========== THREE DOTS ========== */
  .dots-row {
    position: absolute;
    top: 59.5%; left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 5;
    animation: fadeUp 0.6s ease 1.0s both;
  }

  .dot {
    width: clamp(8px, 1vw, 12px);
    height: clamp(8px, 1vw, 12px);
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px rgba(45,170,90,0.6);
    animation: dotPulse 2s ease-in-out infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.3s; }
  .dot:nth-child(3) { animation-delay: 0.6s; }

  @keyframes dotPulse {
    0%, 100% { box-shadow: 0 0 6px rgba(45,170,90,0.4); transform: scale(1); }
    50% { box-shadow: 0 0 14px rgba(45,170,90,0.8); transform: scale(1.15); }
  }

  /* ========== MAIN CHINESE TYPOGRAPHY ========== */
  .main-type {
    position: absolute;
    top: 61%; left: 4%; right: 4%;
    z-index: 5;
    animation: typeIn 1s cubic-bezier(0.22, 1, 0.36, 1) 0.6s both;
  }

  @keyframes typeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .chinese-line {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 0;
    line-height: 1;
  }

  .cn-char {
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    font-weight: 900;
    font-size: clamp(48px, 10vw, 120px);
    color: var(--red-bright);
    letter-spacing: -2px;
    display: inline-block;
    text-shadow:
      3px 3px 0 rgba(0,0,0,0.5),
      0 0 20px rgba(200,60,30,0.3);
    position: relative;
    transition: text-shadow 0.2s;
  }

  .cn-char:hover {
    text-shadow:
      3px 3px 0 rgba(0,0,0,0.5),
      0 0 40px rgba(255,85,51,0.5),
      0 0 80px rgba(255,85,51,0.2);
  }

  /* Glitch effect */
  .cn-char.glitch {
    animation: charGlitch 0.15s steps(2) both;
  }

  @keyframes charGlitch {
    0% { transform: translate(0); filter: none; }
    20% { transform: translate(-3px, 1px); filter: hue-rotate(40deg); }
    40% { transform: translate(2px, -2px); clip-path: inset(20% 0 40% 0); }
    60% { transform: translate(-1px, 2px); filter: hue-rotate(-20deg); }
    80% { transform: translate(3px, 0px); clip-path: inset(60% 0 10% 0); }
    100% { transform: translate(0); filter: none; clip-path: none; }
  }

  .or-text {
    font-family: 'Chakra Petch', sans-serif;
    font-weight: 700;
    font-size: clamp(16px, 2.2vw, 28px);
    color: var(--red-bright);
    letter-spacing: 2px;
    margin: 0 4px;
    align-self: center;
    transform: translateY(-20px);
    text-shadow: 0 0 12px rgba(200,60,30,0.4);
  }

  .cn-line-1 { justify-content: center; }
  .cn-line-2 { justify-content: center; margin-top: -6px; }

  /* ========== SUBTITLE ========== */
  .subtitle {
    position: absolute;
    bottom: 5%; left: 0; right: 0;
    text-align: center;
    z-index: 5;
    animation: fadeUp 0.8s ease 1.1s both;
  }

  .subtitle .cn-sub {
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    font-weight: 400;
    font-size: clamp(14px, 1.8vw, 22px);
    color: var(--text-light);
    letter-spacing: 4px;
    text-shadow: 0 0 8px rgba(204,191,170,0.2);
  }

  .subtitle .en-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(9px, 1vw, 13px);
    color: var(--text-light);
    letter-spacing: 2px;
    opacity: 0.6;
    margin-top: 12px;
    display: block;
  }

  /* ========== SIDE VERTICAL TEXT ========== */
  .side-left, .side-right {
    position: absolute;
    z-index: 6;
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(8px, 0.9vw, 11px);
    color: var(--green-dim);
    letter-spacing: 3px;
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    opacity: 0;
    animation: fadeIn 1s ease both;
    text-shadow: 0 0 6px rgba(30,122,62,0.4);
  }

  .side-left { left: 10px; top: 22%; animation-delay: 1.2s; }
  .side-right { right: 10px; bottom: 10%; animation-delay: 1.3s; }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 0.7; }
  }

  /* ========== RED SCAN LINE ========== */
  .scanline {
    position: absolute;
    top: 43%; left: 5%; right: 5%;
    height: 1.5px;
    background: linear-gradient(90deg, transparent, var(--red-glow), transparent);
    opacity: 0.5;
    z-index: 3;
    animation: scanPulse 4s ease-in-out infinite;
  }

  @keyframes scanPulse {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.7; }
  }

  /* ========== MOVING HORIZONTAL SCAN ========== */
  .h-scan {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent 5%, rgba(45,170,90,0.15), transparent 95%);
    z-index: 7;
    pointer-events: none;
    animation: hScan 8s linear infinite;
  }

  @keyframes hScan {
    0% { top: -2px; }
    100% { top: 100%; }
  }

  /* ========== CORNER BRACKETS ========== */
  .corner {
    position: absolute;
    width: 20px; height: 20px;
    z-index: 6;
    opacity: 0;
    animation: cornerIn 0.5s ease both;
  }

  .corner::before, .corner::after {
    content: '';
    position: absolute;
    background: var(--green);
  }

  .corner-tl { top: 8px; left: 8px; animation-delay: 1.4s; }
  .corner-tl::before { top: 0; left: 0; width: 12px; height: 1.5px; }
  .corner-tl::after { top: 0; left: 0; width: 1.5px; height: 12px; }

  .corner-tr { top: 8px; right: 8px; animation-delay: 1.5s; }
  .corner-tr::before { top: 0; right: 0; width: 12px; height: 1.5px; }
  .corner-tr::after { top: 0; right: 0; width: 1.5px; height: 12px; }

  .corner-bl { bottom: 8px; left: 8px; animation-delay: 1.6s; }
  .corner-bl::before { bottom: 0; left: 0; width: 12px; height: 1.5px; }
  .corner-bl::after { bottom: 0; left: 0; width: 1.5px; height: 12px; }

  .corner-br { bottom: 8px; right: 8px; animation-delay: 1.7s; }
  .corner-br::before { bottom: 0; right: 0; width: 12px; height: 1.5px; }
  .corner-br::after { bottom: 0; right: 0; width: 1.5px; height: 12px; }

  @keyframes cornerIn {
    from { opacity: 0; }
    to { opacity: 0.5; }
  }

  /* ========== NOISE ========== */
  .noise {
    position: absolute;
    inset: 0;
    z-index: 10;
    opacity: 0.035;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 128px;
  }

  /* ========== CRT VIGNETTE (stronger) ========== */
  .vignette {
    position: absolute;
    inset: 0;
    z-index: 9;
    pointer-events: none;
    background: radial-gradient(ellipse at 50% 50%, transparent 45%, rgba(0,0,0,0.55) 100%);
  }

  /* ========== SCANLINES OVERLAY ========== */
  .scanlines {
    position: absolute;
    inset: 0;
    z-index: 8;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.1) 2px,
      rgba(0,0,0,0.1) 4px
    );
  }

  /* ========== RGB SPLIT FLASH ========== */
  .rgb-flash {
    position: absolute;
    inset: 0;
    z-index: 11;
    pointer-events: none;
    opacity: 0;
    mix-blend-mode: screen;
    background: linear-gradient(90deg, rgba(255,0,0,0.03), rgba(0,255,0,0.03), rgba(0,0,255,0.03));
    animation: rgbFlash 6s ease-in-out infinite;
  }

  @keyframes rgbFlash {
    0%, 92%, 100% { opacity: 0; }
    94% { opacity: 1; }
    96% { opacity: 0; }
    97% { opacity: 0.5; }
    98% { opacity: 0; }
  }

  /* ========== BOTTOM DATA BAR ========== */
  .data-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    z-index: 6;
    display: flex;
    gap: 2px;
    padding: 0 5%;
    opacity: 0;
    animation: fadeIn 1s ease 1.8s both;
  }

  .data-bar span {
    flex: 1;
    background: var(--green);
    opacity: 0.3;
    animation: barPulse 3s ease-in-out infinite;
  }

  .data-bar span:nth-child(odd) { animation-delay: 0.5s; }
  .data-bar span:nth-child(3n) { animation-delay: 1s; }

  @keyframes barPulse {
    0%, 100% { opacity: 0.15; }
    50% { opacity: 0.5; }
  }

  /* ========== RESPONSIVE ========== */

  /* Tablet portrait */
  @media (max-width: 768px) {
    .header { gap: clamp(60px, 10vw, 120px); }
    .header-text { font-size: clamp(16px, 4vw, 28px); padding: 3px 8px; letter-spacing: 2px; }
    .globe-container { width: clamp(40px, 10vw, 70px); height: clamp(40px, 10vw, 70px); }
    .year-markers { display: none; }
    .decade-label { font-size: clamp(7px, 1.8vw, 11px); }
    .waveform-year { letter-spacing: 2px; }
    .cn-char { font-size: clamp(42px, 12vw, 90px); }
    .or-text { font-size: clamp(14px, 3vw, 22px); }
    .side-left, .side-right { display: none; }
    .subtitle .cn-sub { letter-spacing: 2px; }
  }

  /* Phone portrait */
  @media (max-width: 480px) {
    .header { gap: clamp(50px, 20vw, 100px); top: 1%; }
    .header-text {
      font-size: clamp(14px, 4.5vw, 22px);
      padding: 3px 6px;
      letter-spacing: 1px;
      border-width: 2px;
    }
    .globe-container {
      width: 36px; height: 36px;
      top: 0.8%;
    }
    .grid-container { top: 8%; height: 46%; left: 2%; right: 2%; }
    .decade-label { font-size: 7px; }
    .label-2005, .label-2000, .label-2015 { display: none; }
    .scanline { top: 44%; left: 2%; right: 2%; }
    .waveform-row { top: 55%; left: 3%; right: 3%; gap: 8px; }
    .waveform-year { font-size: clamp(10px, 3vw, 14px); letter-spacing: 2px; }
    .waveform-canvas { height: 20px; }
    .dots-row { top: 59%; gap: 7px; }
    .dot { width: 6px; height: 6px; }
    .main-type { top: 61%; left: 2%; right: 2%; }
    .cn-char {
      font-size: clamp(36px, 14vw, 70px);
      letter-spacing: -1px;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.5), 0 0 14px rgba(200,60,30,0.3);
    }
    .or-text { font-size: clamp(12px, 3.5vw, 18px); transform: translateY(-12px); }
    .cn-line-2 { margin-top: -4px; }
    .subtitle { bottom: 3%; }
    .subtitle .cn-sub { font-size: clamp(12px, 3.5vw, 18px); letter-spacing: 2px; }
    .subtitle .en-sub { font-size: clamp(8px, 2.2vw, 11px); margin-top: 8px; }
    .corner-tl { top: 4px; left: 4px; }
    .corner-tr { top: 4px; right: 4px; }
    .corner-bl { bottom: 4px; left: 4px; }
    .corner-br { bottom: 4px; right: 4px; }
  }

  /* Very small phones */
  @media (max-width: 360px) {
    .cn-char { font-size: clamp(30px, 13vw, 50px); }
    .header { gap: 50px; }
    .header-text { font-size: 13px; }
    .globe-container { width: 28px; height: 28px; }
    .main-type { top: 62%; }
    .decade-label { display: none; }
  }

  /* Landscape phones */
  @media (max-height: 500px) and (orientation: landscape) {
    .header { top: 0.5%; }
    .header-text { font-size: clamp(12px, 2.5vh, 22px); padding: 2px 6px; }
    .globe-container { width: clamp(28px, 8vh, 50px); height: clamp(28px, 8vh, 50px); top: 0.5%; }
    .year-markers { display: none; }
    .grid-container { top: 8%; height: 40%; }
    .decade-label { display: none; }
    .scanline { top: 40%; }
    .waveform-row { top: 50%; }
    .waveform-year { font-size: clamp(10px, 2.5vh, 16px); }
    .waveform-canvas { height: 18px; }
    .dots-row { top: 55%; }
    .dot { width: 6px; height: 6px; }
    .main-type { top: 57%; }
    .cn-char { font-size: clamp(28px, 10vh, 60px); }
    .or-text { font-size: clamp(10px, 3vh, 18px); transform: translateY(-8px); }
    .cn-line-2 { margin-top: -2px; }
    .subtitle { bottom: 2%; }
    .subtitle .cn-sub { font-size: clamp(10px, 3vh, 16px); }
    .subtitle .en-sub { font-size: clamp(7px, 1.8vh, 10px); margin-top: 4px; }
    .side-left, .side-right { display: none; }
  }

  /* Tall phones (extra vertical space) */
  @media (min-height: 800px) and (max-width: 480px) {
    .grid-container { height: 40%; }
    .waveform-row { top: 52%; }
    .dots-row { top: 56%; }
    .main-type { top: 58%; }
    .subtitle { bottom: 6%; }
  }

  /* Large desktops */
  @media (min-width: 1400px) {
    .header { gap: clamp(140px, 14vw, 220px); }
    .globe-container { width: 110px; height: 110px; }
  }
</style>
</head>
<body>

<div class="poster" id="poster">

  <!-- Ambient glow -->
  <div class="ambient-glow"></div>

  <!-- Corner brackets -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Header -->
  <div class="header">
    <div class="header-text">THE</div>
    <div class="header-text">WARRIORS</div>
  </div>

  <!-- Year markers -->
  <div class="year-markers">
    <span style="transform: translateX(-30px);">1990</span>
    <span style="transform: translateX(30px); margin-top:-12px;">2010</span>
    <span style="transform: translateX(-15px);">2000</span>
    <span style="transform: translateX(20px); margin-top:-12px;">2015</span>
    <span style="transform: translateX(-5px);">2005</span>
    <span style="transform: translateX(15px); margin-top:-12px;">2019</span>
  </div>

  <!-- Wireframe globe -->
  <div class="globe-container">
    <svg class="globe-svg" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <circle cx="40" cy="40" r="36" fill="none" stroke="var(--green)" stroke-width="1" opacity="0.7"/>
      <ellipse cx="40" cy="40" rx="36" ry="14" fill="none" stroke="var(--green)" stroke-width="0.8" opacity="0.5"/>
      <ellipse cx="40" cy="40" rx="36" ry="24" fill="none" stroke="var(--green)" stroke-width="0.8" opacity="0.4" transform="rotate(30, 40, 40)"/>

  <!-- Perspective Grid -->

      <g clip-path="url(#gridClip)">
        <!-- Floor horizontal lines -->

        <line x1="65" y1="245" x2="395" y2="245" stroke="var(--red)" stroke-width="0.8" opacity="0.55"/>
        <line x1="85" y1="215" x2="375" y2="215" stroke="var(--red)" stroke-width="0.7" opacity="0.5"/>
        <line x1="100" y1="190" x2="360" y2="190" stroke="var(--red)" stroke-width="0.7" opacity="0.45"/>
        <line x1="115" y1="168" x2="345" y2="168" stroke="var(--red)" stroke-width="0.6" opacity="0.4"/>
        <line x1="128" y1="150" x2="332" y2="150" stroke="var(--red)" stroke-width="0.6" opacity="0.35"/>
        <line x1="140" y1="135" x2="320" y2="135" stroke="var(--red)" stroke-width="0.5" opacity="0.3"/>
        <line x1="150" y1="122" x2="310" y2="122" stroke="var(--red)" stroke-width="0.5" opacity="0.25"/>
        <line x1="160" y1="112" x2="300" y2="112" stroke="var(--red)" stroke-width="0.4" opacity="0.2"/>
        <line x1="170" y1="103" x2="290" y2="103" stroke="var(--red)" stroke-width="0.4" opacity="0.18"/>
        <line x1="178" y1="96" x2="282" y2="96" stroke="var(--red)" stroke-width="0.3" opacity="0.15"/>

        <!-- Vertical converging lines -->
        <line x1="-40" y1="360" x2="230" y2="80" stroke="var(--red)" stroke-width="1.2" opacity="0.8"/>
        <line x1="30" y1="360" x2="230" y2="80" stroke="var(--red)" stroke-width="1" opacity="0.7"/>
        <line x1="90" y1="360" x2="230" y2="80" stroke="var(--red)" stroke-width="0.9" opacity="0.6"/>
        <line x1="140" y1="360" x2="230" y2="80" stroke="var(--red)" stroke-width="0.8" opacity="0.5"/>
        <line x1="185" y1="360" x2="230" y2="80" stroke="var(--red)" stroke-width="0.7" opacity="0.45"/>
        <line x1="230" y1="360" x2="230" y2="80" stroke="var(--red)" stroke-width="0.7" opacity="0.4"/>
        <line x1="275" y1="360" x2="230" y2="80" stroke="var(--red)" stroke-width="0.7" opacity="0.45"/>
        <line x1="320" y1="360" x2="230" y2="80" stroke="var(--red)" stroke-width="0.8" opacity="0.5"/>
        <line x1="370" y1="360" x2="230" y2="80" stroke="var(--red)" stroke-width="0.9" opacity="0.6"/>
        <line x1="430" y1="360" x2="230" y2="80" stroke="var(--red)" stroke-width="1" opacity="0.7"/>
        <line x1="500" y1="360" x2="230" y2="80" stroke="var(--red)" stroke-width="1.2" opacity="0.8"/>

        <!-- Ceiling -->
        <line x1="-40" y1="0" x2="500" y2="0" stroke="var(--red)" stroke-width="1.2" opacity="0.6"/>
        <line x1="10" y1="30" x2="450" y2="30" stroke="var(--red)" stroke-width="0.9" opacity="0.5"/>
        <line x1="50" y1="52" x2="410" y2="52" stroke="var(--red)" stroke-width="0.7" opacity="0.35"/>
        <line x1="85" y1="68" x2="375" y2="68" stroke="var(--red)" stroke-width="0.6" opacity="0.25"/>

        <!-- Ceiling verticals -->
        <line x1="-40" y1="0" x2="230" y2="80" stroke="var(--red)" stroke-width="1" opacity="0.6"/>
        <line x1="60" y1="0" x2="230" y2="80" stroke="var(--red)" stroke-width="0.8" opacity="0.45"/>
        <line x1="145" y1="0" x2="230" y2="80" stroke="var(--red)" stroke-width="0.6" opacity="0.35"/>
        <line x1="230" y1="0" x2="230" y2="80" stroke="var(--red)" stroke-width="0.5" opacity="0.3"/>
        <line x1="315" y1="0" x2="230" y2="80" stroke="var(--red)" stroke-width="0.6" opacity="0.35"/>
        <line x1="400" y1="0" x2="230" y2="80" stroke="var(--red)" stroke-width="0.8" opacity="0.45"/>
        <line x1="500" y1="0" x2="230" y2="80" stroke="var(--red)" stroke-width="1" opacity="0.6"/>

        <!-- Walls -->
        <line x1="-40" y1="0" x2="-40" y2="360" stroke="var(--red)" stroke-width="1" opacity="0.6"/>
        <line x1="500" y1="0" x2="500" y2="360" stroke="var(--red)" stroke-width="1" opacity="0.6"/>

        <!-- Border -->
        <rect x="0" y="0" width="460" height="360" fill="none" stroke="var(--red)" stroke-width="2" opacity="0.9"/>
      </g>

      <!-- Center diamond -->
      <g transform="translate(230, 260)" opacity="0.7">
        <polygon points="0,-18 18,0 0,18 -18,0" fill="none" stroke="var(--red)" stroke-width="1"/>
        <polygon points="0,-12 12,0 0,12 -12,0" fill="none" stroke="var(--red)" stroke-width="0.6" opacity="0.5"/>
        <line x1="0" y1="-18" x2="0" y2="18" stroke="var(--red)" stroke-width="0.4" opacity="0.4"/>
        <line x1="-18" y1="0" x2="18" y2="0" stroke="var(--red)" stroke-width="0.4" opacity="0.4"/>
        <!-- Pulsing center dot -->
        <circle cx="0" cy="0" r="2" fill="var(--red)" opacity="0.8">
          <animate attributeName="r" values="1.5;3;1.5" dur="2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>

    </svg>
  </div>

  <!-- Scanline -->
  <div class="scanline"></div>

  <!-- Moving scan -->
  <div class="h-scan"></div>

  <!-- Decade labels -->
  <div class="decade-label label-2019">2019 s.</div>

      <span class="cn-char" data-char="伪">伪</span>

    </div>

  <!-- Subtitle -->

    <div class="cn-sub">大屁股鸟</div>

  <!-- Side text -->
  <div class="side-left">1980S</div>
  <div class="side-right">2020S</div>

  <!-- Data bar -->
  <div class="data-bar">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <!-- Overlays -->
  <div class="scanlines"></div>
  <div class="vignette"></div>
  <div class="noise"></div>
  <div class="rgb-flash"></div>
</div>

<script>
  // === GRID FLICKER ===
  const grid = document.querySelector('.grid-container');
  setInterval(() => {
    grid.style.opacity = 0.92 + Math.random() * 0.08;
  }, 150);

  // === MOUSE & TOUCH PARALLAX ===
  const poster = document.getElementById('poster');
  const globe = document.querySelector('.globe-container');

  function handleMove(clientX, clientY) {
    const rect = poster.getBoundingClientRect();
    const x = (clientX - rect.left) / rect.width - 0.5;
    const y = (clientY - rect.top) / rect.height - 0.5;
    globe.style.transform = `translateX(calc(-50% + ${x * 12}px)) translateY(${y * 6}px)`;
  }

  poster.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
  poster.addEventListener('touchmove', (e) => {
    const t = e.touches[0];
    handleMove(t.clientX, t.clientY);
  }, { passive: true });

  // === ANIMATED WAVEFORM ===
  const canvas = document.getElementById('waveCanvas');
  const ctx = canvas.getContext('2d');
  let wavePhase = 0;

  function resizeCanvas() {
    const rect = canvas.getBoundingClientRect();
    if (rect.width === 0 || rect.height === 0) return;
    canvas.width = rect.width * 2;
    canvas.height = rect.height * 2;
    ctx.scale(2, 2);
  }
  resizeCanvas();

  let resizeTimeout;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => {
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      resizeCanvas();
    }, 150);
  });

  function drawWave() {
    const w = canvas.width / 2;
    const h = canvas.height / 2;
    ctx.clearRect(0, 0, w, h);

    ctx.strokeStyle = '#2daa5a';
    ctx.lineWidth = 1.5;
    ctx.shadowColor = 'rgba(45,170,90,0.5)';
    ctx.shadowBlur = 4;
    ctx.beginPath();

    const mid = h / 2;
    for (let x = 0; x < w; x++) {
      const t = x / w;
      const amp = Math.sin(t * Math.PI) * mid * 0.8;
      const noise = Math.sin(t * 40 + wavePhase) * 0.5 +
                    Math.sin(t * 23 + wavePhase * 1.3) * 0.3 +
                    Math.sin(t * 67 + wavePhase * 0.7) * 0.2;
      const y = mid + noise * amp;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Mirror line (dimmer)
    ctx.strokeStyle = 'rgba(45,170,90,0.2)';
    ctx.shadowBlur = 0;
    ctx.beginPath();
    for (let x = 0; x < w; x++) {
      const t = x / w;
      const amp = Math.sin(t * Math.PI) * mid * 0.4;
      const noise = Math.sin(t * 40 + wavePhase + 1) * 0.5 +
                    Math.sin(t * 23 + wavePhase * 1.3 + 1) * 0.3;
      const y = mid + noise * amp;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();

    wavePhase += 0.04;
    requestAnimationFrame(drawWave);
  }
  drawWave();

  // === GLITCH ON CHINESE CHARS ===
  const chars = document.querySelectorAll('.cn-char');

  function triggerGlitch() {
    const idx = Math.floor(Math.random() * chars.length);
    const el = chars[idx];
    el.classList.add('glitch');
    setTimeout(() => el.classList.remove('glitch'), 150);
    setTimeout(triggerGlitch, 2000 + Math.random() * 5000);
  }
  setTimeout(triggerGlitch, 3000);

  // Click/tap to glitch all
  function glitchAll() {
    chars.forEach((el, i) => {
      setTimeout(() => {
        el.classList.add('glitch');
        setTimeout(() => el.classList.remove('glitch'), 150);
      }, i * 50);
    });
  }
  poster.addEventListener('click', glitchAll);
  poster.addEventListener('touchstart', glitchAll, { passive: true });
</script>

</body>
