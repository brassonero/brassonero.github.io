<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1a1714"/>
      <stop offset="100%" stop-color="#0e0c0a"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="url(#bg)"/>
  <!-- Red border glow -->
  <rect x="1" y="1" width="30" height="30" rx="3" fill="none" stroke="#c83c1e" stroke-width="1.5" opacity="0.6"/>
  <!-- Perspective grid lines (simplified) -->
  <line x1="0" y1="28" x2="16" y2="10" stroke="#c83c1e" stroke-width="0.6" opacity="0.35"/>
  <line x1="8" y1="28" x2="16" y2="10" stroke="#c83c1e" stroke-width="0.5" opacity="0.3"/>
  <line x1="16" y1="28" x2="16" y2="10" stroke="#c83c1e" stroke-width="0.5" opacity="0.3"/>
  <line x1="24" y1="28" x2="16" y2="10" stroke="#c83c1e" stroke-width="0.5" opacity="0.3"/>
  <line x1="32" y1="28" x2="16" y2="10" stroke="#c83c1e" stroke-width="0.6" opacity="0.35"/>
  <!-- Horizontal grid -->
  <line x1="3" y1="24" x2="29" y2="24" stroke="#c83c1e" stroke-width="0.5" opacity="0.3"/>
  <line x1="6" y1="20" x2="26" y2="20" stroke="#c83c1e" stroke-width="0.4" opacity="0.25"/>
  <line x1="9" y1="16" x2="23" y2="16" stroke="#c83c1e" stroke-width="0.4" opacity="0.2"/>
  <line x1="11" y1="13" x2="21" y2="13" stroke="#c83c1e" stroke-width="0.3" opacity="0.15"/>
  <!-- Wireframe globe (top center) -->
  <circle cx="16" cy="8" r="5" fill="none" stroke="#2daa5a" stroke-width="0.8" opacity="0.7"/>
  <ellipse cx="16" cy="8" rx="5" ry="2" fill="none" stroke="#2daa5a" stroke-width="0.5" opacity="0.4"/>
  <ellipse cx="16" cy="8" rx="2" ry="5" fill="none" stroke="#2daa5a" stroke-width="0.5" opacity="0.4"/>
  <!-- Center diamond -->
  <polygon points="16,18 20,22 16,26 12,22" fill="none" stroke="#c83c1e" stroke-width="0.8" opacity="0.6"/>
  <circle cx="16" cy="22" r="1.2" fill="#c83c1e" opacity="0.8"/>
  <!-- Green data dots -->
  <circle cx="12" cy="28" r="1" fill="#2daa5a" opacity="0.5"/>
  <circle cx="16" cy="28" r="1" fill="#2daa5a" opacity="0.5"/>
  <circle cx="20" cy="28" r="1" fill="#2daa5a" opacity="0.5"/>
</svg>
