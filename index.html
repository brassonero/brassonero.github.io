<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="ℏ">
    <title>brassonero</title>
    <link rel="icon" href="./assets/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="./assets/favicon.ico" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes psychedelicFlow {
            0% {
                background-position: 0% 0%;
            }
            25% {
                background-position: 100% 50%;
            }
            50% {
                background-position: 100% 100%;
            }
            75% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 0% 0%;
            }
        }

        @keyframes breathe {
            0%, 100% {
                transform: scale(1) translateZ(0);
            }
            50% {
                transform: scale(1.03) translateZ(0);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0) rotate(0deg) scale(1);
            }
            33% {
                transform: translateY(-30px) translateX(20px) rotate(120deg) scale(1.1);
            }
            66% {
                transform: translateY(20px) translateX(-20px) rotate(240deg) scale(0.95);
            }
        }

        @keyframes shimmer {
            0% {
                opacity: 0;
                transform: translate(-30%, -40%) scale(0.8);
            }
            40% {
                opacity: 0.6;
                transform: translate(0%, -10%) scale(1.1);
            }
            70% {
                opacity: 0.4;
                transform: translate(20%, 10%) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(30%, 40%) scale(0.8);
            }
        }

        @keyframes morphOrb {
            0%, 100% {
                border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            }
            50% {
                border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%;
            }
        }

        @keyframes geometricPulse {
            0%, 100% {
                transform: rotate(0deg) scale(1);
                opacity: 0.03;
            }
            50% {
                transform: rotate(180deg) scale(1.2);
                opacity: 0.08;
            }
        }

        @keyframes grainDrift {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-2%, -3%); }
            20% { transform: translate(3%, 1%); }
            30% { transform: translate(-1%, 3%); }
            40% { transform: translate(2%, -2%); }
            50% { transform: translate(-3%, 1%); }
            60% { transform: translate(1%, -1%); }
            70% { transform: translate(-2%, 2%); }
            80% { transform: translate(3%, -3%); }
            90% { transform: translate(-1%, -2%); }
        }

        @keyframes revealText {
            0% {
                opacity: 0;
                letter-spacing: 0.5em;
                filter: blur(12px);
            }
            50% {
                opacity: 0.8;
                letter-spacing: 0.15em;
                filter: blur(0px);
            }
            85% {
                opacity: 0.5;
                filter: blur(0px);
            }
            100% {
                opacity: 0;
                filter: blur(6px);
            }
        }

        body {
            min-height: 100vh;
            min-height: -webkit-fill-available;
            min-height: 100dvh;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(255, 20, 147, 0.4), transparent 40%),
                radial-gradient(ellipse at 80% 70%, rgba(0, 255, 255, 0.3), transparent 40%),
                radial-gradient(ellipse at 50% 50%, rgba(138, 43, 226, 0.3), transparent 50%),
                radial-gradient(ellipse at top left, rgba(254, 168, 55, 0.5), transparent 40%),
                radial-gradient(ellipse at bottom right, rgba(89, 62, 103, 0.5), transparent 40%),
                linear-gradient(
                    135deg, 
                    #FF1493,
                    #FF6B35,
                    #FEA837,
                    #00CED1,
                    #8A2BE2,
                    #FF1493,
                    #00FA9A,
                    #FFD700,
                    #FF1493
                );
            background-size: 400% 400%;
            animation: 
                psychedelicFlow 30s cubic-bezier(0.4, 0, 0.6, 1) infinite,
                breathe 6s ease-in-out infinite;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: crosshair;
            overflow: hidden;
            position: relative;
            -webkit-tap-highlight-color: transparent;
            transition: filter 0.8s ease;
        }

        body.playing {
            animation-duration: 15s, 4s;
        }

        /* Film grain overlay */
        .grain {
            position: fixed;
            inset: -60%;
            width: 220%;
            height: 220%;
            pointer-events: none;
            z-index: 50;
            opacity: 0.035;
            mix-blend-mode: overlay;
            animation: grainDrift 0.8s steps(1) infinite;
            -webkit-mask-image: radial-gradient(ellipse at center, black 40%, transparent 72%);
            mask-image: radial-gradient(ellipse at center, black 40%, transparent 72%);
        }

        body.playing .grain {
            opacity: 0.05;
        }



        .geometric-overlay {
            position: absolute;
            inset: -20%;
            pointer-events: none;
            opacity: 0.06;
            mix-blend-mode: overlay;
            animation: geometricPulse 10s ease-in-out infinite;
            background-image: 
                radial-gradient(circle 2px at 25% 25%, rgba(255, 255, 255, 0.08) 0%, transparent 100%),
                radial-gradient(circle 3px at 75% 20%, rgba(255, 255, 255, 0.06) 0%, transparent 100%),
                radial-gradient(circle 2px at 50% 60%, rgba(255, 255, 255, 0.07) 0%, transparent 100%),
                radial-gradient(circle 4px at 15% 80%, rgba(255, 255, 255, 0.05) 0%, transparent 100%),
                radial-gradient(circle 2px at 85% 70%, rgba(255, 255, 255, 0.06) 0%, transparent 100%),
                radial-gradient(circle 3px at 40% 90%, rgba(255, 255, 255, 0.04) 0%, transparent 100%),
                radial-gradient(circle 2px at 60% 35%, rgba(255, 255, 255, 0.07) 0%, transparent 100%);
        }

        body::before {
            content: '';
            position: absolute;
            inset: -50%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255, 255, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(255, 20, 147, 0.03) 0%, transparent 50%);
            animation: float 25s ease-in-out infinite;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            inset: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 50% 50%, rgba(255, 255, 255, 0.18), transparent 60%);
            animation: shimmer 8s ease-in-out infinite;
            pointer-events: none;
            mix-blend-mode: overlay;
            border-radius: 50%;
        }

        .orbs-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            filter: blur(40px);
            opacity: 0.5;
            transition: filter 1s ease, opacity 1s ease;
        }

        body.playing .orbs-container {
            filter: blur(30px);
            opacity: 0.6;
        }

        .orb {
            position: absolute;
            mix-blend-mode: screen;
            animation: morphOrb 8s ease-in-out infinite;
            transition: transform 0.3s ease-out;
        }

        .orb1 {
            width: min(600px, 80vw);
            height: min(600px, 80vw);
            background: radial-gradient(circle, rgba(255, 20, 147, 0.8), rgba(254, 168, 55, 0.4), transparent);
            top: -20%;
            left: -20%;
            animation: float 20s ease-in-out infinite, morphOrb 8s ease-in-out infinite;
        }

        .orb2 {
            width: min(400px, 60vw);
            height: min(400px, 60vw);
            background: radial-gradient(circle, rgba(0, 255, 255, 0.8), rgba(138, 43, 226, 0.4), transparent);
            bottom: -15%;
            right: -15%;
            animation: float 25s ease-in-out infinite reverse, morphOrb 10s ease-in-out infinite reverse;
        }

        .orb3 {
            width: min(350px, 50vw);
            height: min(350px, 50vw);
            background: radial-gradient(circle, rgba(138, 43, 226, 0.6), rgba(0, 255, 127, 0.3), transparent);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: float 18s ease-in-out infinite 3s, morphOrb 7s ease-in-out infinite;
        }

        .audio-control {
            position: fixed;
            bottom: max(env(safe-area-inset-bottom), 20px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            padding: clamp(12px, 3vw, 15px) clamp(20px, 5vw, 30px);
            display: flex;
            align-items: center;
            gap: clamp(10px, 2vw, 15px);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
            box-shadow: 
                0 8px 32px rgba(138, 43, 226, 0.15),
                0 0 80px rgba(255, 20, 147, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            touch-action: manipulation;
            min-width: 120px;
            justify-content: center;
        }

        .audio-control:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(-50%) translateY(-3px) scale(1.05);
            box-shadow: 
                0 12px 48px rgba(138, 43, 226, 0.25),
                0 0 120px rgba(255, 20, 147, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .audio-control:active {
            transform: translateX(-50%) scale(0.98);
        }



        .play-icon {
            opacity: 1;
            transform: scale(1);
        }

        body.playing .play-icon {
            opacity: 0;
            transform: scale(0.8);
        }

        .visualizer {
            display: flex;
            gap: 3px;
            height: 24px;
            align-items: center;
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 0.3s ease, transform 0.3s ease;
            width: 0;
            overflow: hidden;
        }

        body.playing .visualizer {
            opacity: 1;
            transform: scale(1);
            width: auto;
        }

        .bar {
            width: 2.5px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 3px;
            transition: height 0.08s ease-out;
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.3);
            will-change: height;
        }

        .bar1 { height: 4px; }
        .bar2 { height: 6px; }
        .bar3 { height: 4px; }
        .bar4 { height: 8px; }
        .bar5 { height: 5px; }
        .bar6 { height: 3px; }
        .bar7 { height: 7px; }

        .cursor-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 20, 147, 0.08), rgba(0, 255, 255, 0.04), transparent 40%);
            pointer-events: none;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s ease;
            z-index: 5;
            mix-blend-mode: screen;
            filter: blur(2px);
        }

        .hint {
            position: fixed;
            top: max(env(safe-area-inset-top), 20px);
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(11px, 2.5vw, 13px);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            opacity: 0;
            animation: revealText 10s ease-in-out 1.5s;
            pointer-events: none;
            text-shadow: 
                0 0 30px rgba(255, 20, 147, 0.4),
                0 2px 10px rgba(0, 0, 0, 0.3);
            padding: 0 20px;
            text-align: center;
            font-weight: 300;
        }

        .kaleidoscope {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 3s ease;
            mix-blend-mode: multiply;
        }

        body.playing .kaleidoscope {
            opacity: 0.03;
        }

        .kaleidoscope::before,
        .kaleidoscope::after {
            content: '';
            position: absolute;
            inset: -50%;
            background: conic-gradient(
                from 0deg,
                transparent,
                rgba(255, 20, 147, 0.1),
                transparent,
                rgba(0, 255, 255, 0.1),
                transparent,
                rgba(138, 43, 226, 0.1),
                transparent
            );
            animation: rotate 60s linear infinite;
        }

        .kaleidoscope::after {
            animation-direction: reverse;
            animation-duration: 45s;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Central ℏ symbol */
        .planck {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            pointer-events: none;
            z-index: 3;
            font-size: clamp(140px, 28vw, 320px);
            font-weight: 200;
            font-family: 'Times New Roman', 'Georgia', serif;
            color: rgba(255, 255, 255, 0);
            text-shadow: none;
            transition: color 1.5s ease, text-shadow 1.5s ease, transform 1.5s ease;
            user-select: none;
            line-height: 1;
            will-change: transform, text-shadow, color;
            opacity: 0;
        }

        body.playing .planck {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            color: rgba(255, 255, 255, 0.35);
            text-shadow:
                0 0 30px rgba(255, 255, 255, 0.12),
                0 0 80px rgba(255, 20, 147, 0.2),
                0 0 160px rgba(138, 43, 226, 0.12),
                0 0 300px rgba(0, 255, 255, 0.05);
        }


        @media (max-width: 768px) {
            body {
                cursor: default;
                animation-duration: 35s, 12s;
            }

            .cursor-glow {
                display: none;
            }

            .geometric-overlay {
                opacity: 0.03;
            }

            .kaleidoscope {
                display: none;
            }

            .planck {
                font-size: clamp(120px, 35vw, 240px);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            body {
                animation: none;
                background-size: 100% 100%;
            }

            body::before,
            body::after,
            .orb,
            .kaleidoscope::before,
            .kaleidoscope::after,
            .geometric-overlay,
            .grain {
                animation: none;
            }
        }
    </style>
</head>
<body>
    <canvas class="grain" id="grainCanvas"></canvas>

    <div class="planck" id="planckSymbol">ℏ</div>

    <div class="geometric-overlay"></div>
    
    <div class="orbs-container" id="orbsContainer">
        <div class="orb orb1" id="orb1"></div>
        <div class="orb orb2" id="orb2"></div>
        <div class="orb orb3" id="orb3"></div>
    </div>

    <div class="kaleidoscope"></div>

    <div class="hint">brassonero</div>

    <div class="cursor-glow"></div>

    <div class="audio-control">
        <svg class="play-icon" viewBox="0 0 24 24" style="position:absolute;inset:0;margin:auto;width:clamp(18px,4.5vw,22px);height:clamp(18px,4.5vw,22px);fill:white;filter:drop-shadow(0 0 3px rgba(255,20,147,0.5));transition:opacity 0.3s ease,transform 0.3s ease;z-index:2;">
            <path d="M8 5v14l11-7z"/>
        </svg>
        <div class="visualizer">
            <div class="bar bar1"></div>
            <div class="bar bar2"></div>
            <div class="bar bar3"></div>
            <div class="bar bar4"></div>
            <div class="bar bar5"></div>
            <div class="bar bar6"></div>
            <div class="bar bar7"></div>
        </div>
    </div>

    <audio id="backgroundAudio">
        <source src="./assets/brassonero.mp3" type="audio/mpeg">
        Tu navegador no admite el elemento de audio.
    </audio>

    <script>
        const audio = document.getElementById('backgroundAudio');
        const audioControl = document.querySelector('.audio-control');
        const cursorGlow = document.querySelector('.cursor-glow');
        const bars = document.querySelectorAll('.bar');
        const planckEl = document.getElementById('planckSymbol');
        const grainCanvas = document.getElementById('grainCanvas');
        const gCtx = grainCanvas.getContext('2d');

        let isPlaying = false;
        let hasPlayed = false;
        let audioContext = null;
        let analyser = null;
        let dataArray = null;
        let source = null;

        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || 
                        window.matchMedia("(max-width: 768px)").matches;

        // ── Film grain ──
        function initGrain() {
            grainCanvas.width = 1024;
            grainCanvas.height = 1024;
            generateGrain();
        }

        function generateGrain() {
            const imageData = gCtx.createImageData(1024, 1024);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const v = Math.random() * 255;
                data[i] = v;
                data[i + 1] = v;
                data[i + 2] = v;
                data[i + 3] = 255;
            }
            gCtx.putImageData(imageData, 0, 0);
        }

        // Regenerate grain periodically for texture variety
        setInterval(generateGrain, 100);
        initGrain();


        // ── Web Audio API setup ──
        function initAudioContext() {
            if (audioContext) return;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            analyser.smoothingTimeConstant = 0.8;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            source = audioContext.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioContext.destination);
        }

        // ── Audio-reactive helpers ──
        function getFrequencyBands() {
            if (!analyser || !isPlaying) return { bass: 0, mid: 0, high: 0, average: 0 };
            analyser.getByteFrequencyData(dataArray);
            const len = dataArray.length;
            let bass = 0, mid = 0, high = 0, sum = 0;
            for (let i = 0; i < len; i++) {
                sum += dataArray[i];
                if (i < len * 0.15) bass += dataArray[i];
                else if (i < len * 0.5) mid += dataArray[i];
                else high += dataArray[i];
            }
            const bassCount = Math.floor(len * 0.15) || 1;
            const midCount = Math.floor(len * 0.35) || 1;
            const highCount = len - Math.floor(len * 0.5) || 1;
            return {
                bass: bass / bassCount / 255,
                mid: mid / midCount / 255,
                high: high / highCount / 255,
                average: sum / len / 255,
            };
        }

        // ── Update ℏ symbol from audio ──
        let planckScale = 1;
        let planckGlow = 0;
        function updatePlanck(bands) {
            if (!isPlaying) {
                // Clear inline styles so CSS transition handles the fade-out
                planckScale += (1 - planckScale) * 0.05;
                planckGlow += (0 - planckGlow) * 0.05;
                if (Math.abs(planckScale - 1) < 0.01) {
                    planckEl.style.removeProperty('transform');
                    planckEl.style.removeProperty('color');
                    planckEl.style.removeProperty('text-shadow');
                }
                return;
            }
            const targetScale = 1 + bands.bass * 0.18 + bands.average * 0.06;
            const targetGlow = bands.average;
            planckScale += (targetScale - planckScale) * 0.18;
            planckGlow += (targetGlow - planckGlow) * 0.15;

            const alpha = 0.25 + planckGlow * 0.5;
            const innerGlow = 20 + planckGlow * 60;
            const magentaGlow = 40 + bands.bass * 120;
            const violetGlow = 80 + bands.mid * 160;
            const cyanGlow = 160 + bands.high * 300;
            const magentaAlpha = 0.1 + bands.bass * 0.4;
            const violetAlpha = 0.06 + bands.mid * 0.25;
            const cyanAlpha = 0.02 + bands.high * 0.1;

            planckEl.style.transform = `translate(-50%, -50%) scale(${planckScale})`;
            planckEl.style.color = `rgba(255, 255, 255, ${alpha})`;
            planckEl.style.textShadow = `0 0 ${innerGlow}px rgba(255, 255, 255, ${alpha * 0.3}), 0 0 ${magentaGlow}px rgba(255, 20, 147, ${magentaAlpha}), 0 0 ${violetGlow}px rgba(138, 43, 226, ${violetAlpha}), 0 0 ${cyanGlow}px rgba(0, 255, 255, ${cyanAlpha})`;
        }


        // ── Drive visualizer bars from real audio data ──
        function updateBars(bands) {
            if (!isPlaying || !analyser) return;
            analyser.getByteFrequencyData(dataArray);
            const step = Math.floor(dataArray.length / bars.length);
            bars.forEach((bar, i) => {
                const val = dataArray[i * step] / 255;
                const h = 3 + val * 21;
                bar.style.height = h + 'px';
                bar.style.opacity = 0.5 + val * 0.5;
            });
        }

        // ── Orb audio reactivity + mouse parallax ──
        let mouseX = 0.5, mouseY = 0.5;
        const orb1 = document.getElementById('orb1');
        const orb2 = document.getElementById('orb2');
        const orb3 = document.getElementById('orb3');

        function updateOrbs(bands) {
            if (!isPlaying) return;
            const bassScale = 1 + bands.bass * 0.15;
            const midScale = 1 + bands.mid * 0.1;
            // Parallax offsets from mouse (desktop only)
            const px = isMobile ? 0 : (mouseX - 0.5) * 30;
            const py = isMobile ? 0 : (mouseY - 0.5) * 30;

            orb1.style.transform = `translate(${px * 0.8}px, ${py * 0.8}px) scale(${bassScale})`;
            orb2.style.transform = `translate(${-px * 0.5}px, ${-py * 0.5}px) scale(${midScale})`;
            orb3.style.transform = `translate(${px * 0.3 - 50}%, ${py * 0.3 - 50}%) scale(${1 + bands.high * 0.12})`;
        }

        // ── Main animation loop ──
        let animFrame;
        function animate(time) {
            const bands = getFrequencyBands();
            updatePlanck(bands);
            updateBars(bands);
            updateOrbs(bands);

            animFrame = requestAnimationFrame(animate);
        }
        animFrame = requestAnimationFrame(animate);

        // ── Toggle audio ──
        function toggleAudio() {
            if (!isPlaying) {
                initAudioContext();
                if (audioContext.state === 'suspended') {
                    audioContext.resume();
                }
                if (hasPlayed && audio.ended) {
                    audio.currentTime = 0;
                    hasPlayed = false;
                }
                
                audio.play().then(() => {
                    isPlaying = true;
                    hasPlayed = true;
                    document.body.classList.add('playing');
                }).catch(error => {
                    console.log('Play failed:', error);
                });
            } else {
                audio.pause();
                isPlaying = false;
                document.body.classList.remove('playing');
                document.body.style.filter = '';
            }
        }

        audio.addEventListener('ended', () => {
            isPlaying = false;
            document.body.classList.remove('playing');
            document.body.style.filter = '';
        });

        audioControl.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleAudio();
        });

        document.body.addEventListener('click', (e) => {
            if (!isPlaying && e.target === document.body) {
                toggleAudio();
            }
        });

        let touchStart = null;
        document.body.addEventListener('touchstart', (e) => {
            touchStart = e.touches[0];
        });

        document.body.addEventListener('touchend', (e) => {
            if (touchStart && !isPlaying && e.target === document.body) {
                const touchEnd = e.changedTouches[0];
                const distance = Math.sqrt(
                    Math.pow(touchEnd.clientX - touchStart.clientX, 2) +
                    Math.pow(touchEnd.clientY - touchStart.clientY, 2)
                );
                if (distance < 10) {
                    toggleAudio();
                }
            }
            touchStart = null;
        });

        // ── Desktop mouse interactions ──
        if (!isMobile) {
            let rawMouseX = 0, rawMouseY = 0;
            let glowX = 0, glowY = 0;
            
            function animateGlow() {
                glowX += (rawMouseX - glowX) * 0.08;
                glowY += (rawMouseY - glowY) * 0.08;
                
                cursorGlow.style.left = glowX + 'px';
                cursorGlow.style.top = glowY + 'px';
                
                requestAnimationFrame(animateGlow);
            }
            animateGlow();
            
            document.addEventListener('mousemove', (e) => {
                rawMouseX = e.clientX;
                rawMouseY = e.clientY;
                mouseX = e.clientX / window.innerWidth;
                mouseY = e.clientY / window.innerHeight;
                
                const hueRotation = mouseX * 60 - 30;
                const brightness = 0.95 + mouseY * 0.1;
                
                if (isPlaying) {
                    document.body.style.filter = `hue-rotate(${hueRotation}deg) brightness(${brightness}) saturate(1.4)`;
                }
                
                const duration = isPlaying ? `${10 + mouseY * 5}s, ${4 + mouseX * 2}s` : `${20 + mouseY * 10}s, ${6 + mouseX * 4}s`;
                document.body.style.animationDuration = duration;
            });

            document.addEventListener('mouseenter', () => {
                cursorGlow.style.opacity = '1';
            });

            document.addEventListener('mouseleave', () => {
                cursorGlow.style.opacity = '0';
            });
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                toggleAudio();
            }
            
            if (e.code === 'KeyP' && !isMobile) {
                document.body.style.filter = `hue-rotate(${Math.random() * 360}deg) brightness(1.2) saturate(2)`;
                setTimeout(() => {
                    document.body.style.filter = isPlaying ? 'brightness(1.1) saturate(1.3)' : '';
                }, 2000);
            }
        });

        // ── Viewport ──
        function setViewportHeight() {
            const vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        setViewportHeight();
        window.addEventListener('resize', () => {
            setViewportHeight();
        });
        window.addEventListener('orientationchange', () => {
            setViewportHeight();
        });

        if (isMobile) {
            document.body.style.willChange = 'transform';
        }

        let touchStartY = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            const touchY = e.touches[0].clientY;
            const touchDiff = touchY - touchStartY;
            if (touchDiff > 0 && window.scrollY === 0) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
