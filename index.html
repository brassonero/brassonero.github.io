<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>brassonero</title>
    <meta name="description" content="ℏ">
    <meta name="theme-color" content="#8a2be2">
    <!-- Open Graph (Facebook, LinkedIn, Discord, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="brassonero">
    <meta property="og:description" content="ℏ">
    <meta property="og:image" content="https://brassonero.github.io/assets/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="ℏ">
    <meta property="og:url" content="https://brassonero.github.io">
    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="brassonero">
    <meta name="twitter:description" content="ℏ">
    <meta name="twitter:image" content="https://brassonero.github.io/assets/og-image.png">
    <meta name="twitter:image:alt" content="ℏ">
    <link rel="icon" href="./assets/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="./assets/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <canvas class="grain" id="grainCanvas" aria-hidden="true"></canvas>

    <div class="planck" id="planckSymbol" aria-hidden="true">ℏ</div>

    <div class="geometric-overlay" aria-hidden="true"></div>

    <div class="orbs-container" id="orbsContainer" aria-hidden="true">
        <div class="orb orb1" id="orb1"></div>
        <div class="orb orb2" id="orb2"></div>
        <div class="orb orb3" id="orb3"></div>
    </div>

    <div class="kaleidoscope" aria-hidden="true"></div>

    <div class="hint">brassonero</div>

    <div class="cursor-glow" aria-hidden="true"></div>

    <div class="audio-control" role="button" tabindex="0" aria-label="Reproducir o pausar la música" aria-pressed="false">
        <svg class="play-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M8 5v14l11-7z" />
        </svg>
        <div class="visualizer" aria-hidden="true">
            <div class="bar bar1"></div>
            <div class="bar bar2"></div>
            <div class="bar bar3"></div>
            <div class="bar bar4"></div>
            <div class="bar bar5"></div>
            <div class="bar bar6"></div>
            <div class="bar bar7"></div>
        </div>
    </div>

    <audio id="backgroundAudio" preload="auto">
        <source src="./assets/brassonero.mp3" type="audio/mpeg">
        Tu navegador no admite el elemento de audio.
    </audio>

    <script src="script.js"></script>
</body>

</html>
